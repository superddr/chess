<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>国际象棋残局研究器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #e8e4da; color: #33291a; min-height: 100vh;
  }
  header { text-align: center; padding: 12px 8px 4px; }
  header h1 { font-size: clamp(18px, 4.5vw, 26px); letter-spacing: 2px; color: #4a3a20; }
  header a { font-size: 13px; color: #7a6a52; }
  .wrap {
    display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
    align-items: flex-start; padding: 10px; max-width: 1000px; margin: 0 auto;
  }
  #boardBox { width: min(94vw, 480px); flex: 0 0 auto; }
  canvas { width: 100%; display: block; touch-action: manipulation; user-select: none;
           border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.25); }
  .panel {
    flex: 1 1 280px; max-width: 480px; min-width: 260px;
    background: #fffdf7; border-radius: 12px; padding: 14px;
    box-shadow: 0 2px 10px rgba(0,0,0,.12);
  }
  .status { font-size: 17px; font-weight: bold; min-height: 24px; color: #6b4a12; }
  .sub { font-size: 13px; color: #7a6a52; min-height: 18px; margin: 4px 0 10px; }
  .ptitle { font-size: 13px; color: #7a6a52; margin: 8px 0 4px; }
  .pal { display: flex; flex-wrap: wrap; gap: 6px; }
  .pbtn {
    width: 46px; height: 46px; border-radius: 10px; border: 2px solid #b0a17f;
    background: linear-gradient(160deg, #fbf6e8, #e9dfc4);
    font-size: 28px; cursor: pointer; position: relative; line-height: 1;
  }
  .pbtn.w { color: #fdfdfd; text-shadow: 0 0 2px #333, 0 0 2px #333, 0 1px 1px #000; }
  .pbtn.b { color: #1c1c1c; }
  .pbtn .cnt {
    position: absolute; right: -4px; top: -4px; background: #4a3a20; color: #fff;
    font-size: 10px; border-radius: 8px; padding: 1px 5px;
  }
  .pbtn.sel { outline: 3px solid #16a34a; outline-offset: 2px; }
  .pbtn:disabled { opacity: .35; cursor: default; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; align-items: center; }
  button.act, select {
    padding: 9px 14px; border-radius: 8px; border: 1px solid #c2b492;
    background: #f5efdf; color: #443519; font-size: 14px; cursor: pointer;
  }
  button.act:active { transform: scale(.97); }
  button.act.sel { outline: 3px solid #16a34a; outline-offset: 1px; }
  button.primary {
    width: 100%; margin-top: 12px; padding: 12px; font-size: 16px; font-weight: bold;
    border: none; border-radius: 10px; background: #4a5d23; color: #fff; cursor: pointer;
  }
  button.primary:disabled { background: #a8a08b; }
  #hintBtn { background: #15803d; }
  .log {
    margin-top: 12px; max-height: 180px; overflow-y: auto; font-size: 13px;
    background: #f4efe2; border-radius: 8px; padding: 8px 10px; line-height: 1.7;
  }
  .log .r { color: #7a5c10; } .log .b { color: #1f2937; }
  #toast {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    background: rgba(35,28,12,.92); color: #ffedc9; padding: 10px 18px;
    border-radius: 10px; font-size: 15px; opacity: 0; pointer-events: none;
    transition: opacity .25s; max-width: 86vw; text-align: center; z-index: 99;
  }
  #toast.show { opacity: 1; }
  #modal {
    position: fixed; inset: 0; background: rgba(25,20,8,.55); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 12px;
  }
  #modal[hidden] { display: none; }
  .mcard {
    background: #fffdf7; border-radius: 12px; padding: 16px;
    width: min(94vw, 520px); box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  #mtitle { font-weight: bold; margin-bottom: 8px; color: #4a3a20; }
  #mtext {
    width: 100%; height: min(46vh, 320px); resize: vertical;
    border: 1px solid #c2b492; border-radius: 8px; padding: 8px;
    font-size: 13px; line-height: 1.5; background: #faf5e9; color: #33291a;
  }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #4a5d23;
          border-top-color: transparent; border-radius: 50%; animation: sp 1s linear infinite;
          vertical-align: -2px; margin-right: 6px; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>♞ 国际象棋 · 残局研究器</h1>
  <a id="xqLink" href="#">⇄ 切换到中国象棋版</a>
</header>
<div class="wrap">
  <div id="boardBox"><canvas id="cv"></canvas></div>
  <div class="panel">
    <div id="status" class="status">布置残局：先点选下方棋子，再点击棋盘放置</div>
    <div id="sub" class="sub">白方为玩家（下方），黑方为 AI（上方）；兵升变自动成后</div>

    <div id="setupPanel">
      <div class="ptitle">白方棋子（玩家 · 下方）</div>
      <div id="whitePal" class="pal"></div>
      <div class="ptitle">黑方棋子（AI · 上方）</div>
      <div id="blackPal" class="pal"></div>
      <div class="row">
        <button id="openingBtn" class="act">⚔ 标准开局</button>
        <button id="eraseBtn" class="act">🧹 移除棋子</button>
        <button id="clearBtn" class="act">清空棋盘</button>
        <button id="exportBtn" class="act">📋 导出局面</button>
        <button id="importBtn" class="act">📥 导入局面</button>
        <select id="presetSel">
          <option value="">— 载入示例残局 —</option>
          <option value="kqk">后杀单王（基本杀法）</option>
          <option value="kpk">王兵对王·白可胜（王占兵前两格）</option>
          <option value="kpkdraw">王兵对王·和棋（黑有对王，防守精确则和）</option>
          <option value="krk">车杀单王（基本杀法）</option>
        </select>
      </div>
      <button id="startBtn" class="primary">▶ 开始对弈（白方先行）</button>
    </div>

    <div id="playPanel" hidden>
      <button id="hintBtn" class="primary">💡 求助：给出最佳走法</button>
      <div class="row">
        <button id="undoBtn" class="act">↩ 悔棋</button>
        <button id="retryBtn" class="act">🔄 重试本局</button>
        <button id="setupBtn" class="act">🛠 重新布局</button>
        <button id="exportBtn2" class="act">📋 导出局面</button>
      </div>
      <div class="row">
        <label style="font-size:14px">黑方由：
          <select id="blackSrc">
            <option value="ai" selected>本机 AI 应招</option>
            <option value="manual">手动代走（对战外部 AI）</option>
          </select>
        </label>
        <button id="aiPlayBtn" class="act" hidden>🤖 AI 代走黑棋</button>
      </div>
      <div class="row">
        <label style="font-size:14px">AI 棋力：
          <select id="levelSel">
            <option value="1">快速 (1秒)</option>
            <option value="4">较快 (4秒)</option>
            <option value="16" selected>标准 (16秒)</option>
            <option value="64">深算 (64秒)</option>
            <option value="256">长考 (256秒)</option>
          </select>
        </label>
      </div>
      <div id="moveLog" class="log" hidden></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="modal" hidden>
  <div class="mcard">
    <div id="mtitle">导出局面</div>
    <textarea id="mtext" spellcheck="false"></textarea>
    <div class="row">
      <button id="mcopy" class="act">📋 复制全部</button>
      <button id="mload" class="act">📥 载入此局面</button>
      <button id="mclose" class="act">关闭</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ---------- 常量 ---------- */
const GLYPH = { K:'♚', Q:'♛', R:'♜', B:'♝', N:'♞', P:'♟' };   // 实心字形，双方用颜色区分
const MAXC = { K:1, Q:9, R:10, B:10, N:10, P:8 };
const S = 64, M = 36, LW = M*2 + 8*S, LH = LW;
const FILES = 'abcdefgh';
const sqName = i => FILES[i % 8] + (8 - Math.floor(i / 8));

/* ---------- 状态 ---------- */
let board = Array(64).fill('.');
let epState = -1;             // 可吃过路兵目标格
let mode = 'setup';
let turn = 'w';
let curPiece = null;
let sel = -1;
let allMoves = [];
let lastMove = null, hintMove = null;
let history = [];
let startBoard = null;
let snaps = [];
let busy = false;
let moveNo = 0;

const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d');
let scale = 1;
$('xqLink').href = location.protocol + '//' + location.hostname + ':8765/';

/* ---------- 画布 ---------- */
function resize() {
  const w = $('boardBox').clientWidth;
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.round(w * dpr);
  cv.height = Math.round(w * LH / LW * dpr);
  cv.style.height = (w * LH / LW) + 'px';
  scale = w * dpr / LW;
  render();
}
window.addEventListener('resize', resize);
const X = c => M + c * S, Y = r => M + r * S;

function render() {
  const btn = $('aiPlayBtn');
  if (btn) btn.hidden = !(mode === 'play' && manualBlack() && turn === 'b');
  if (!busy) saveState();
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
  ctx.clearRect(0, 0, LW, LH);
  ctx.fillStyle = '#3d3324';
  ctx.fillRect(0, 0, LW, LH);
  // 棋盘格
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    ctx.fillStyle = (r + c) % 2 === 0 ? '#f0d9b5' : '#b58863';
    ctx.fillRect(X(c), Y(r), S, S);
  }
  // 最后一步高亮
  if (lastMove) for (const i of lastMove) {
    ctx.fillStyle = 'rgba(58,130,246,.35)';
    ctx.fillRect(X(i % 8), Y(Math.floor(i / 8)), S, S);
  }
  // 坐标
  ctx.fillStyle = '#d8c9a3'; ctx.font = '14px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let c = 0; c < 8; c++) ctx.fillText(FILES[c], X(c) + S / 2, LH - M / 2);
  for (let r = 0; r < 8; r++) ctx.fillText(String(8 - r), M / 2, Y(r) + S / 2);
  // 求助箭头
  if (hintMove) {
    for (const i of hintMove) {
      ctx.strokeStyle = '#16a34a'; ctx.lineWidth = 4;
      ctx.strokeRect(X(i % 8) + 3, Y(Math.floor(i / 8)) + 3, S - 6, S - 6);
    }
    arrow(hintMove[0], hintMove[1], '#16a34a');
  }
  // 棋子
  for (let i = 0; i < 64; i++) if (board[i] !== '.') drawPiece(i, board[i]);
  // 选中与落点
  if (sel >= 0) {
    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 4;
    ctx.strokeRect(X(sel % 8) + 2, Y(Math.floor(sel / 8)) + 2, S - 4, S - 4);
    for (const [f, t] of allMoves) if (f === sel) {
      const x = X(t % 8) + S / 2, y = Y(Math.floor(t / 8)) + S / 2;
      ctx.beginPath();
      if (board[t] === '.') { ctx.arc(x, y, 9, 0, 7); ctx.fillStyle = 'rgba(22,163,74,.5)'; ctx.fill(); }
      else { ctx.arc(x, y, S * 0.46, 0, 7); ctx.strokeStyle = 'rgba(22,163,74,.9)'; ctx.lineWidth = 4; ctx.stroke(); }
    }
  }
}

function drawPiece(i, p) {
  const x = X(i % 8) + S / 2, y = Y(Math.floor(i / 8)) + S / 2 + 2;
  const white = p === p.toUpperCase();
  ctx.font = (S * 0.78) + 'px "Segoe UI Symbol", serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const g = GLYPH[p.toUpperCase()];
  if (white) {
    ctx.fillStyle = '#fafafa'; ctx.fillText(g, x, y);
    ctx.lineWidth = 1.6; ctx.strokeStyle = '#1f1f1f'; ctx.strokeText(g, x, y);
  } else {
    ctx.fillStyle = '#1a1a1a'; ctx.fillText(g, x, y);
    ctx.lineWidth = 1; ctx.strokeStyle = '#666'; ctx.strokeText(g, x, y);
  }
}

function arrow(f, t, color) {
  const x1 = X(f % 8) + S/2, y1 = Y(Math.floor(f / 8)) + S/2;
  const x2 = X(t % 8) + S/2, y2 = Y(Math.floor(t / 8)) + S/2;
  const a = Math.atan2(y2 - y1, x2 - x1), R = S * 0.42;
  const sx = x1 + Math.cos(a) * R, sy = y1 + Math.sin(a) * R;
  const ex = x2 - Math.cos(a) * R, ey = y2 - Math.sin(a) * R;
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.setLineDash([8, 6]);
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(ex + Math.cos(a) * 10, ey + Math.sin(a) * 10);
  ctx.lineTo(ex - Math.cos(a - .5) * 10, ey - Math.sin(a - .5) * 10);
  ctx.lineTo(ex - Math.cos(a + .5) * 10, ey - Math.sin(a + .5) * 10);
  ctx.fill();
}

/* ---------- 工具 ---------- */
let toastTimer;
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function setStatus(main, sub) {
  $('status').innerHTML = main;
  if (sub !== undefined) $('sub').textContent = sub;
}
const boardStr = () => board.join('');
const level = () => Number($('levelSel').value);
const manualBlack = () => $('blackSrc').value === 'manual';
function turnStatus(extraSub) {
  if (turn === 'w') setStatus('轮到白方走棋', extraSub || '');
  else setStatus('请代黑方走棋（输入外部对手的走法）',
                 extraSub || '点击黑方棋子并落子；或点「AI 代走黑棋」');
}

/* ---------- 请求（重试 + 任务轮询） ---------- */
const sleep = ms => new Promise(r => setTimeout(r, ms));
async function rawApi(path, data) {
  const res = await fetch(path, { method: 'POST',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
  return await res.json();
}
function noteReconnect(n) {
  $('sub').textContent = '📡 连接中断，正在自动重连（第 ' + n + ' 次）…服务器仍在计算，不会丢';
}
async function withRetry(fn) {
  let n = 0;
  while (true) {
    try {
      const r = await fn();
      if (n) $('sub').textContent = '✅ 已重新连接';
      return r;
    } catch (e) {
      noteReconnect(++n);
      await sleep(Math.min(1000 * n, 5000));
    }
  }
}
const JOB_APIS = new Set(['/api/move', '/api/aimove', '/api/hint']);
async function api(path, data) {
  if (JOB_APIS.has(path)) {
    const sub = await withRetry(() => rawApi(path, data));
    if (!sub.ok) throw new Error(sub.error || '服务错误');
    if (sub.status === 'done') {          // 快棋：提交时已算完
      if (!sub.result.ok) throw new Error(sub.result.error || '服务错误');
      return sub.result;
    }
    // 长轮询（10秒一轮，避免代理掐长连接）；失败立即重试不依赖定时器
    let n = 0;
    while (true) {
      let j;
      try { j = await rawApi('/api/job', { id: sub.job, wait: 10 }); n = 0; }
      catch (e) {
        n++;
        noteReconnect(n);
        if (n >= 3) await sleep(800);
        continue;
      }
      if (!j.ok) throw new Error(j.error || '服务错误');
      if (j.status === 'done') {
        if (!j.result.ok) throw new Error(j.result.error || '服务错误');
        return j.result;
      }
    }
  }
  const j = await withRetry(() => rawApi(path, data));
  if (!j.ok) throw new Error(j.error || '服务错误');
  return j;
}

/* ---------- 存档恢复 ---------- */
const SAVE_KEY = 'intlchess_v1';
function saveState() {
  try {
    if (mode === 'setup') {
      localStorage.setItem(SAVE_KEY, JSON.stringify({ mode: 'setup', board: boardStr() }));
      return;
    }
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      mode, turn, board: boardStr(), ep: epState, history,
      startBoard: startBoard && startBoard.join(''),
      snaps: snaps.map(s => ({ ...s, board: s.board.join('') })),
      moveNo, log: $('moveLog').innerHTML, lastMove,
      blackSrc: $('blackSrc').value, level: $('levelSel').value,
    }));
  } catch (e) {}
}
function restoreState() {
  let s;
  try { s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch (e) { s = null; }
  if (!s || !s.board) return;
  try {
    board = s.board.split('');
    if (s.mode === 'setup') { refreshPalette(); render(); return; }
    turn = s.turn || 'w';
    epState = s.ep == null ? -1 : s.ep;
    history = s.history || [];
    startBoard = s.startBoard ? s.startBoard.split('') : null;
    snaps = (s.snaps || []).map(x => ({ ...x, board: x.board.split('') }));
    moveNo = s.moveNo || 0;
    lastMove = s.lastMove || null;
    $('moveLog').innerHTML = s.log || '';
    $('moveLog').hidden = !s.log;
    $('blackSrc').value = s.blackSrc || 'ai';
    $('levelSel').value = s.level || '16';
    mode = 'play';
    $('setupPanel').hidden = true;
    $('playPanel').hidden = false;
    fetchMoves().then(() => { turnStatus('已恢复上次对局'); render(); });
    toast('已恢复上次对局');
  } catch (e) { localStorage.removeItem(SAVE_KEY); }
}

/* ---------- 着法文本 ---------- */
function moveText(bd, f, t, ep) {
  const p = bd[f];
  const cap = bd[t] !== '.' || ((p === 'P' || p === 'p') && t === ep && bd[t] === '.');
  let txt = GLYPH[p.toUpperCase()] + sqName(f) + (cap ? '×' : '–') + sqName(t);
  if ((p === 'P' && t < 8) || (p === 'p' && t >= 56)) txt += '=♛';
  return txt;
}
function logMove(side, text) {
  const log = $('moveLog'); log.hidden = false;
  if (side === '白') moveNo++;
  const div = document.createElement('div');
  div.className = side === '白' ? 'r' : 'b';
  div.textContent = (side === '白' ? moveNo + '. ' : '　 ') + side + '：' + text;
  log.appendChild(div); log.scrollTop = log.scrollHeight;
}

/* ---------- 摆子 ---------- */
function buildPalette() {
  for (const [elId, cls, pieces] of [
      ['whitePal', 'w', 'KQRBNP'], ['blackPal', 'b', 'kqrbnp']]) {
    const el = $(elId);
    for (const p of pieces) {
      const b = document.createElement('button');
      b.className = 'pbtn ' + cls; b.dataset.piece = p;
      b.innerHTML = GLYPH[p.toUpperCase()] + '<span class="cnt"></span>';
      b.onclick = () => { curPiece = curPiece === p ? null : p; refreshPalette(); };
      el.appendChild(b);
    }
  }
}
function refreshPalette() {
  document.querySelectorAll('.pbtn').forEach(b => {
    const p = b.dataset.piece;
    const used = board.filter(x => x === p).length;
    const left = MAXC[p.toUpperCase()] - used;
    b.querySelector('.cnt').textContent = left;
    b.disabled = left <= 0 && curPiece !== p;
    b.classList.toggle('sel', curPiece === p);
  });
  $('eraseBtn').classList.toggle('sel', curPiece === 'erase');
}
function setupErr(p, i) {
  if ((p === 'P' || p === 'p') && (i < 8 || i >= 56)) return '兵不能放在第一或第八横排';
  return null;
}

/* ---------- 点击棋盘 ---------- */
cv.addEventListener('pointerdown', e => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * LW;
  const y = (e.clientY - rect.top) / rect.height * LH;
  const c = Math.floor((x - M) / S), r = Math.floor((y - M) / S);
  if (c < 0 || c > 7 || r < 0 || r > 7) return;
  onPoint(r * 8 + c);
});

function onPoint(i) {
  if (mode === 'setup') return setupClick(i);
  if (mode !== 'play' || busy) return;
  if (turn === 'b' && !manualBlack()) return;
  hintMove = null;
  const p = board[i];
  const own = p !== '.' && ((p === p.toUpperCase()) === (turn === 'w'));
  if (sel >= 0 && allMoves.some(([f, t]) => f === sel && t === i)) return doMove(sel, i);
  if (own) sel = sel === i ? -1 : i;
  else if (sel >= 0) { if (p !== '.') toast('不能走到那里'); sel = -1; }
  render();
}

function setupClick(i) {
  if (curPiece && curPiece !== 'erase') {
    if (board[i] === curPiece) { board[i] = '.'; }
    else {
      const used = board.filter(x => x === curPiece).length;
      if (used >= MAXC[curPiece.toUpperCase()]) return toast('该棋子数量已用完');
      const err = setupErr(curPiece, i);
      if (err) return toast(err);
      board[i] = curPiece;
    }
  } else {
    if (board[i] === '.') return;
    board[i] = '.';
  }
  refreshPalette(); render();
}

/* ---------- 对弈流程 ---------- */
async function fetchMoves() {
  try {
    const j = await api('/api/moves', { board: boardStr(), ep: epState, side: turn });
    allMoves = j.moves;
  } catch (e) { toast(e.message); }
}

async function startGame() {
  try {
    $('startBtn').disabled = true;
    await api('/api/start', { board: boardStr() });
    startBoard = board.slice();
    epState = -1;
    history = [boardStr() + 'w-1'];
    snaps = []; sel = -1; lastMove = null; hintMove = null; moveNo = 0; turn = 'w';
    $('moveLog').innerHTML = ''; $('moveLog').hidden = true;
    mode = 'play';
    $('setupPanel').hidden = true; $('playPanel').hidden = false;
    await fetchMoves();
    setStatus('对弈开始，请白方走棋', '点击己方棋子，再点击目标位置');
    render();
  } catch (e) { toast(e.message); }
  finally { $('startBtn').disabled = false; }
}

function snapshot() {
  snaps.push({ board: board.slice(), history: history.slice(), turn: turn, ep: epState,
               lastMove: lastMove, moveNo: moveNo, log: $('moveLog').innerHTML });
}
async function restoreSnap() {
  const s = snaps.pop();
  board = s.board; history = s.history; turn = s.turn; epState = s.ep; lastMove = s.lastMove;
  moveNo = s.moveNo; $('moveLog').innerHTML = s.log;
  await fetchMoves();
}
const OVER_ICON = { white: '🎉 ', black: '😔 ', draw: '🤝 ' };

function applyLocal(f, t) {   // 本地预演走子（吃过路兵/自动升后）
  const p = board[f];
  if ((p === 'P' || p === 'p') && t === epState && board[t] === '.')
    board[t + (p === 'P' ? 8 : -8)] = '.';
  board[t] = p; board[f] = '.';
  if (p === 'P' && t < 8) board[t] = 'Q';
  if (p === 'p' && t >= 56) board[t] = 'q';
}

async function doMove(f, t) {
  snapshot();
  const text = moveText(board, f, t, epState);
  const prevBoard = board.slice(), prevEp = epState;
  const mover = turn;
  applyLocal(f, t);
  sel = -1; lastMove = [f, t]; hintMove = null;
  busy = true; render();
  logMove(mover === 'w' ? '白' : '黑', text);
  try {
    if (mover === 'w' && !manualBlack()) {
      setStatus('<span class="spin"></span>黑方思考中…', '');
      const j = await api('/api/move', {
        board: prevBoard.join(''), ep: prevEp, history, from: f, to: t, time: level() });
      history.push(j.playerKey);
      if (j.gameOver && !j.aiMove) {
        board = j.board.split(''); epState = j.ep;
        return finish(OVER_ICON[j.gameOver] + j.message);
      }
      const midBoard = j.aiMove ? board.slice() : null;
      const aiText = moveText(board, j.aiMove.from, j.aiMove.to, j.ep);
      board = j.board.split('');
      epState = j.ep;
      history.push(j.aiKey);
      lastMove = [j.aiMove.from, j.aiMove.to];
      logMove('黑', aiText);
      if (j.gameOver) return finish(OVER_ICON[j.gameOver] + j.message);
      await fetchMoves();
      setStatus(j.checkWhite ? '⚠️ 黑方将军！请应将' : '轮到白方走棋',
                '黑方走了：' + aiText + (j.depth ? '（搜索深度 ' + j.depth + '）' : ''));
    } else {
      const j = await api('/api/usermove', {
        board: prevBoard.join(''), ep: prevEp, history, from: f, to: t, side: mover });
      history.push(j.key);
      board = j.board.split('');
      epState = j.ep;
      if (j.gameOver) return finish(OVER_ICON[j.gameOver] + j.message);
      turn = mover === 'w' ? 'b' : 'w';
      await fetchMoves();
      if (j.check) {
        setStatus('⚠️ ' + (turn === 'w' ? '黑方将军！请应将' : '白方将军！请代黑方应将'), '');
      } else turnStatus();
    }
  } catch (e) {
    await restoreSnap();
    toast(e.message);
    turnStatus();
  } finally { busy = false; render(); }
}

async function aiPlay() {
  if (mode !== 'play' || busy || turn !== 'b') return;
  snapshot();
  busy = true; sel = -1; hintMove = null; render();
  setStatus('<span class="spin"></span>黑方 AI 思考中…', '');
  try {
    const j = await api('/api/aimove', { board: boardStr(), ep: epState, history, time: level() });
    const aiText = moveText(board, j.aiMove.from, j.aiMove.to, epState);
    board = j.board.split('');
    epState = j.ep;
    history.push(j.aiKey);
    lastMove = [j.aiMove.from, j.aiMove.to];
    logMove('黑', aiText);
    if (j.gameOver) return finish(OVER_ICON[j.gameOver] + j.message);
    turn = 'w';
    await fetchMoves();
    setStatus(j.checkWhite ? '⚠️ 黑方将军！请应将' : '轮到白方走棋', '黑方走了：' + aiText);
  } catch (e) {
    await restoreSnap();
    toast(e.message);
    turnStatus();
  } finally { busy = false; render(); }
}

function finish(msg) {
  mode = 'over';
  setStatus(msg, '可点「悔棋」回到上一步继续研究，或「重试本局」重新来过');
  busy = false; render();
}

async function hint() {
  if (mode !== 'play' || busy) return;
  if (turn === 'b' && !manualBlack()) return;
  busy = true;
  setStatus('<span class="spin"></span>正在计算最佳走法…', '');
  try {
    const j = await api('/api/hint', { board: boardStr(), ep: epState, history, time: level(), side: turn });
    hintMove = [j.from, j.to]; sel = -1;
    setStatus('💡 建议' + (turn === 'b' ? '（黑方）' : '') + '：<span style="color:#15803d">' +
              moveText(board, j.from, j.to, epState) + '</span>',
              '绿色虚线箭头即建议走法（搜索深度 ' + j.depth + '）');
  } catch (e) { toast(e.message); turnStatus(); }
  finally { busy = false; render(); }
}

async function undo() {
  if (busy || !snaps.length) { if (!snaps.length) toast('没有可悔的棋'); return; }
  const s = snaps.pop();
  board = s.board; history = s.history; turn = s.turn; epState = s.ep; lastMove = s.lastMove;
  moveNo = s.moveNo; $('moveLog').innerHTML = s.log;
  if (!$('moveLog').innerHTML) $('moveLog').hidden = true;
  sel = -1; hintMove = null; mode = 'play';
  await fetchMoves();
  turnStatus('已悔棋');
  render();
}

async function retry() {
  if (busy || !startBoard) return;
  board = startBoard.slice();
  epState = -1;
  history = [boardStr() + 'w-1'];
  snaps = []; sel = -1; lastMove = null; hintMove = null; moveNo = 0; turn = 'w';
  $('moveLog').innerHTML = ''; $('moveLog').hidden = true;
  mode = 'play';
  await fetchMoves();
  setStatus('已重置到开局，请白方走棋', '');
  render();
}

function backToSetup() {
  if (busy) return;
  if (startBoard) board = startBoard.slice();
  mode = 'setup'; sel = -1; lastMove = null; hintMove = null; epState = -1;
  $('setupPanel').hidden = false; $('playPanel').hidden = true;
  setStatus('布置残局：先点选下方棋子，再点击棋盘放置',
            '白方为玩家（下方），黑方为 AI（上方）；兵升变自动成后');
  refreshPalette(); render();
}

/* ---------- 导出 / 导入（支持 FEN） ---------- */
function toFEN() {
  const rows = [];
  for (let r = 0; r < 8; r++) {
    let row = '', empty = 0;
    for (let c = 0; c < 8; c++) {
      const p = board[r * 8 + c];
      if (p === '.') empty++;
      else { if (empty) { row += empty; empty = 0; } row += p; }
    }
    if (empty) row += empty;
    rows.push(row);
  }
  const side = mode === 'setup' ? 'w' : turn;
  const epSq = epState >= 0 ? sqName(epState) : '-';
  return rows.join('/') + ' ' + side + ' - ' + epSq + ' 0 1';
}
function exportText() {
  const lines = ['【国际象棋残局导出】'];
  lines.push('FEN: ' + toFEN());
  lines.push('局面代码: ' + boardStr() + (mode === 'setup' ? 'w' : turn) + epState);
  if (mode === 'setup') lines.push('状态: 布局中（白方为玩家先行，黑方为 AI）');
  else if (mode === 'over') lines.push('状态: 对局已结束');
  else lines.push('状态: 对弈中，轮到' + (turn === 'w' ? '白方' : '黑方') + '走棋');
  lines.push('');
  lines.push('盘面（大写=白方，小写=黑方；a8 在左上）:');
  lines.push('　　ａｂｃｄｅｆｇｈ');
  for (let r = 0; r < 8; r++) {
    let row = String(8 - r) + '：　';
    for (let c = 0; c < 8; c++) {
      const p = board[r * 8 + c];
      row += p === '.' ? '・' : (p === p.toUpperCase() ? p : p);
    }
    lines.push(row);
  }
  lines.push('');
  const list = white => {
    const arr = [];
    for (let i = 0; i < 64; i++) {
      const p = board[i];
      if (p === '.' || (p === p.toUpperCase()) !== white) continue;
      arr.push(GLYPH[p.toUpperCase()] + sqName(i));
    }
    return arr.length ? arr.join(' ') : '（无）';
  };
  lines.push('白方子力: ' + list(true));
  lines.push('黑方子力: ' + list(false));
  const log = $('moveLog').innerText.trim();
  if (log) { lines.push(''); lines.push('已走着法:'); lines.push(log); }
  return lines.join('\n');
}
function parseFEN(text) {
  const m = text.match(/([KQRBNPkqrbnp1-8]+(?:\/[KQRBNPkqrbnp1-8]+){7})\s+([wb])/);
  if (!m) return null;
  const rows = m[1].split('/');
  const b = [];
  for (const row of rows) {
    for (const ch of row) {
      if (/[1-8]/.test(ch)) for (let k = 0; k < +ch; k++) b.push('.');
      else b.push(ch);
    }
  }
  return b.length === 64 ? b : null;
}
function showModal(title, text, forImport) {
  $('mtitle').textContent = title;
  $('mtext').value = text;
  $('mtext').placeholder = forImport ? '粘贴 FEN、导出文本或 64 字符局面代码…' : '';
  $('mload').hidden = !forImport;
  $('modal').hidden = false;
  if (!forImport) { $('mtext').focus(); $('mtext').select(); }
}
$('mclose').onclick = () => { $('modal').hidden = true; };
$('modal').onclick = e => { if (e.target === $('modal')) $('modal').hidden = true; };
$('mcopy').onclick = () => {
  const ta = $('mtext');
  ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (e) {}
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(ta.value).then(() => toast('已复制到剪贴板'));
  } else toast(ok ? '已复制到剪贴板' : '请长按文本框全选后手动复制');
};
$('mload').onclick = () => {
  const text = $('mtext').value;
  let b = null;
  const m = text.match(/[.KQRBNPkqrbnp]{64}/);
  if (m && !text.includes('/')) b = m[0].split('');
  if (!b) b = parseFEN(text);
  if (!b && m) b = m[0].split('');
  if (!b) return toast('未找到有效的 FEN 或局面代码');
  board = b;
  mode = 'setup'; curPiece = null; sel = -1; lastMove = null; hintMove = null; epState = -1;
  $('setupPanel').hidden = false; $('playPanel').hidden = true;
  $('modal').hidden = true;
  refreshPalette(); render();
  setStatus('已载入局面，检查无误后点击「开始对弈」', '');
  toast('局面已载入');
};

/* ---------- 示例残局 ---------- */
function loadPreset(name) {
  board = Array(64).fill('.');
  const put = (sq, p) => {
    const c = FILES.indexOf(sq[0]), r = 8 - +sq[1];
    board[r * 8 + c] = p;
  };
  if (name === 'kqk') { put('e3', 'K'); put('d3', 'Q'); put('e7', 'k'); }
  else if (name === 'kpk') { put('e6', 'K'); put('e4', 'P'); put('e8', 'k'); }
  else if (name === 'kpkdraw') { put('e5', 'K'); put('e4', 'P'); put('e7', 'k'); }
  else if (name === 'krk') { put('e3', 'K'); put('a1', 'R'); put('d6', 'k'); }
  curPiece = null; refreshPalette(); render();
}

/* ---------- 绑定 ---------- */
$('exportBtn').onclick = () => showModal('导出局面（复制后发给 AI 分析）', exportText(), false);
$('exportBtn2').onclick = () => showModal('导出局面（复制后发给 AI 分析）', exportText(), false);
$('importBtn').onclick = () => showModal('导入局面', '', true);
$('openingBtn').onclick = () => {
  board = ('rnbqkbnr' + 'pppppppp' + '........' + '........' +
           '........' + '........' + 'PPPPPPPP' + 'RNBQKBNR').split('');
  curPiece = null; refreshPalette(); render();
  setStatus('已摆好标准开局，可微调后点击「开始对弈」', '');
};
$('eraseBtn').onclick = () => { curPiece = curPiece === 'erase' ? null : 'erase'; refreshPalette(); };
$('clearBtn').onclick = () => { board = Array(64).fill('.'); refreshPalette(); render(); };
$('presetSel').onchange = e => { if (e.target.value) { loadPreset(e.target.value); e.target.value = ''; } };
$('startBtn').onclick = startGame;
$('hintBtn').onclick = hint;
$('undoBtn').onclick = undo;
$('retryBtn').onclick = retry;
$('setupBtn').onclick = backToSetup;
$('aiPlayBtn').onclick = aiPlay;
$('blackSrc').onchange = () => {
  render();
  if (mode === 'play' && !busy) {
    if (turn === 'b' && !manualBlack()) aiPlay();
    else turnStatus();
  }
};

// 渲染保险丝：省电模式/后台节流下也保证界面最终刷新
setInterval(() => { requestAnimationFrame(render); }, 900);
window.addEventListener('focus', () => render());
document.addEventListener('visibilitychange', () => render());
buildPalette();
refreshPalette();
resize();
restoreState();
</script>
